  <script>
      
      let editor = null;
let currentUser = null;
let currentFileName = null;
let currentMode = "javascript";
let isDarkTheme = false;
let previewVisible = false;

      
      
   // Detectar query string ?project=...
       function verificarQueryProjeto() {
       const params = new URLSearchParams(window.location.search);
       const nome = params.get("project");
       if (nome) carregarProjeto(nome);
}
      // Chamar após login e initCodeMirror

function updateAvatar() {
  const avatar = document.getElementById("userAvatar");
  if (currentUser && currentUser.photoURL) {
    avatar.style.backgroundImage = `url('${currentUser.photoURL}')`;
    avatar.innerHTML = "";
  } else if (currentUser) {
    avatar.style.backgroundImage = "none";
    avatar.textContent = (currentUser.email || "A").charAt(0).toUpperCase();
  } else {
    avatar.textContent = "?";
  }
}

function initCodeMirror() {
  if (editor) editor.toTextArea();
  editor = CodeMirror.fromTextArea(document.getElementById("codeEditor"), {
    mode: currentMode,
    theme: isDarkTheme ? "monokai" : "default",
    lineNumbers: true,
    tabSize: 2,
    indentUnit: 2,
    matchBrackets: true,
    autoCloseBrackets: true,
    autoCloseTags: true
  });

  editor.setValue("// Bem-vindo ao AFFriend Code\nconsole.log('Olá, mundo!');");
  editor.on("change", () => {
    if (previewVisible) updatePreview();
  });
}

function setMode(mode) {
  currentMode = mode;
  if (editor) editor.setOption("mode", mode);
  document.getElementById("btnJS").classList.toggle("active", mode === "javascript");
  document.getElementById("btnHTML").classList.toggle("active", mode === "htmlmixed");
}

function toggleTheme() {
  isDarkTheme = !isDarkTheme;
  if (editor) editor.setOption("theme", isDarkTheme ? "monokai" : "default");
}

function runCode() {
  if (!editor) return;
  const code = editor.getValue().trim();
  const win = window.open("", "_blank");
  win.document.write(code);
  win.document.close();
}
//FUNÇÃO PARA SAVE/GUARDAR PROJECTO 
function saveFile() {
  if (!currentUser) return alert("Faça login primeiro.");
  openModal("modalSaveProject");
}

function togglePriceField() {
  const type = document.getElementById("projType").value;
  document.getElementById("priceField").classList.toggle("hidden", type !== "paid");
}

async function confirmSaveProject() {
  const title = document.getElementById("projTitle").value.trim();
  const description = document.getElementById("projDesc").value.trim();
  const type = document.getElementById("projType").value;
  const price = type === "paid" ? Number(document.getElementById("projPrice").value) : 0;
  const image = document.getElementById("projImage").value.trim();

  if (!title) return alert("Título obrigatório.");

  const data = {
    code: editor.getValue(),
    mode: currentMode,
    title,
    description,
    type,
    price,
    image,
    lastModified: Date.now()
  };

  try {
    // Guardar no espaço do usuário
    await firebase.database().ref(`users/${currentUser.uid}/projects/${title}`).set(data);

    // Se for pago, também listar no Marketplace
    if (type === "paid" && price > 0) {
      const ref = firebase.database().ref("marketplace").push();
      await ref.set({
         id: ref.key,
         title,
         description,
         category: "Projetos",
         price,
         emoji: "💡",
         type: "project",
         images: image ? [image] : [],
         sellerId: currentUser.uid,   // <-- CORRETO
         createdAt: Date.now()
      });
    }

    currentFileName = title;
    closeModal("modalSaveProject");
    alert(`✅ Projeto "${title}" guardado como ${type === "free" ? "Grátis" : "Pago"}!`);
  } catch (err) {
    alert("Erro ao guardar: " + err.message);
  }
}
    function openModal(id) {
  document.getElementById(id).classList.remove("hidden");
}
function closeModal(id) {
  document.getElementById(id).classList.add("hidden");
} //FIM DA FUNÇÃO  OU CODIGO DE GUARDAR

   //NOVO FICHEIRO OU PROJECTO   
      function newFile() {
  if (confirm("Criar novo arquivo?")) {
    editor.setValue("");
    currentFileName = null;
  }
}

function formatCode() {
  if (editor) editor.setValue(editor.getValue().trim());
}

async function exportAsZip() {
  if (!editor) return;
  const zip = new JSZip();
  let fileName = currentFileName || "projeto";
  zip.file(currentMode === "htmlmixed" ? "index.html" : "script.js", editor.getValue());
  const content = await zip.generateAsync({ type: "blob" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = fileName + ".zip";
  a.click();
}

function togglePreview() {
  previewVisible = !previewVisible;
  const frame = document.getElementById("previewFrame");
  frame.style.display = previewVisible ? "block" : "none";
  if (previewVisible) updatePreview();
}

function updatePreview() {
  if (currentMode !== "htmlmixed") return;
  const iframe = document.getElementById("previewFrame");
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(editor.getValue());
  doc.close();
}

      function goToPage(page) {
  const routes = {
    projects: "user-projects.html",
    feedback: "ver-feedback.html",
    cursos: "cursos.html",
    produtos: "produtos.html",
    marketplace: "marketplace.html",
    configuracoes: "configuracoes.html"
  };
  if (routes[page]) window.location.href = routes[page];
}
      
    /* ============================
   SIDEBAR S3 — CONTROLES
============================ */

const sidebar = document.getElementById("sidebarS3");
const overlay = document.getElementById("sidebarOverlay");
const toggleBtn = document.getElementById("sidebarToggle");
const closeBtn = document.getElementById("closeSidebar");

let startX = 0;
let currentX = 0;
let isDragging = false;
const sidebarWidth = 260;

/* ---------------------------
   FUNÇÕES PRINCIPAIS
---------------------------- */

// Abrir sidebar
function openSidebar() {
  sidebar.style.transform = "translateX(0)";
  overlay.classList.remove("hidden");
  overlay.classList.add("sidebar-overlay-visible");
}

// Fechar sidebar
function closeSidebarFunc() {
  sidebar.style.transform = "translateX(-100%)";
  overlay.classList.add("hidden");
  overlay.classList.remove("sidebar-overlay-visible");
}

/* ---------------------------
   BOTÕES
---------------------------- */

if (toggleBtn) toggleBtn.onclick = openSidebar;
if (closeBtn) closeBtn.onclick = closeSidebarFunc;
if (overlay) overlay.onclick = closeSidebarFunc;

/* ---------------------------
   SWIPE (TOUCH)
---------------------------- */

document.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  currentX = startX;

  // Se sidebar está aberta → permitir arrastar para fechar
  if (sidebar.style.transform === "translateX(0px)" ||
      sidebar.style.transform === "translateX(0)") {
    isDragging = true;
  }

  // Se toque começou na borda esquerda → permitir abrir
  if (startX < 30) {
    isDragging = true;
  }
});

document.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  currentX = e.touches[0].clientX;
  const deltaX = currentX - startX;

  // Abrir arrastando da esquerda
  if (startX < 30 && deltaX > 0) {
    const move = Math.min(deltaX - sidebarWidth, 0);
    sidebar.style.transform = `translateX(${move}px)`;
    overlay.classList.remove("hidden");
  }

  // Fechar arrastando da direita
  if ((sidebar.style.transform === "translateX(0px)" ||
       sidebar.style.transform === "translateX(0)") && deltaX < 0) {
    const move = Math.max(deltaX, -sidebarWidth);
    sidebar.style.transform = `translateX(${move}px)`;
  }
});

document.addEventListener("touchend", () => {
  if (!isDragging) return;

  const deltaX = currentX - startX;

  // Abrir se arrastou mais de 60px
  if (startX < 30 && deltaX > 60) {
    openSidebar();
  }
  // Fechar se arrastou mais de 60px para a esquerda
  else if (deltaX < -60) {
    closeSidebarFunc();
  }
  // Caso contrário, volta ao estado anterior
  else {
    if (sidebar.style.transform.includes("-")) {
      closeSidebarFunc();
    } else {
      openSidebar();
    }
  }

  isDragging = false;
});
  </script>

      /* Container do modal */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;

.modal.hidden { display: none; }

/* Caixa do modal */
.modal-content {
  background: #fff;
  padding: 24px;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 6px 24px rgba(0,0,0,.25);
  animation: fadeIn .3s ease;
}
.modal-content h2 {
  margin-top: 0;
  font-size: 18px;
  font-weight: 700;
  color: #e60023;
  margin-bottom: 16px;
}

/* Labels */
.modal-content label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #333;
  margin-bottom: 6px;
}

/* Inputs e textarea */
.modal-content input,
.modal-content textarea,
.modal-content select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 14px;
  transition: border-color .25s, box-shadow .25s;
}
.modal-content input:focus,
.modal-content textarea:focus,
.modal-content select:focus {
  border-color: #e60023;
  box-shadow: 0 0 0 2px rgba(230,0,35,0.2);
  outline: none;
}

/* Textarea */
.modal-content textarea {
  min-height: 80px;
  resize: vertical;
}

/* Botões */
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 20px;
}
.modal-actions button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
}
.modal-actions button:first-child {
  background: #f5f5f5;
  color: #333;
}
.modal-actions button:first-child:hover {
  background: #e0e0e0;
}
.modal-actions button:last-child {
  background: #e60023;
  color: #fff;
  box-shadow: 0 2px 6px rgba(230,0,35,0.4);
}
.modal-actions button:last-child:hover {
  background: #cc001f;
  transform: translateY(-2px);
}

/* Animação */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
