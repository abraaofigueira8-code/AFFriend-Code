<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projeto - AFFriend Code</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="scripts/projectosGerais.js"></script>

</head>

<body class="bg-gray-50">

  <!-- NAVBAR -->
  <header class="fixed top-0 left-0 right-0 z-40 bg-black/80 backdrop-blur border-b border-red-900/40">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-bold text-lg">
          AF
        </div>
        <div class="leading-tight">
          <div class="text-white font-semibold text-sm md:text-base">Professor Abraão Figueira</div>
          <div class="text-xs text-gray-400">AFFriend Code Platform</div>
        </div>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="meus-projetos.html" class="hover:text-white">Meus Projetos</a>
      </div>
      
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="dashboard.html" class="hover:text-white">Editor</a>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="mensagens.html" class="hover:text-white">Mensagens</a>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="notificacoes.html" class="hover:text-white">Notificações</a>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="my-activity.html" class="hover:text-white">Actividades</a>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="produtos.html" class="hover:text-white">Produtos</a>
      </div>
    </div>
      <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">
        <a href="index.html" class="hover:text-white">Início</a>
        <a href="cursos.html" class="hover:text-white">Cursos</a>
        <a href="explorar.html" class="hover:text-white">Marketplace</a>
        <a href="materiais.html" class="hover:text-white">Materiais</a>   
      <a href="login.html" class="bg-red-600 text-white px-4 md:px-6 py-2 rounded-full text-sm font-semibold hover:bg-red-500">
        Criar Conta Grátis
      </a>
    </div>
  </nav>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pt-28 pb-20 max-w-5xl mx-auto px-6">

    <!-- LOADING -->
    <div id="loading" class="text-center text-gray-600 text-lg">
      Carregando projeto...
    </div>

    <!-- PROJETO -->
    <div id="projetoBox" class="hidden bg-white shadow-xl rounded-3xl p-10">

      <div class="flex flex-col md:flex-row gap-10">

        <!-- EMOJI -->
        <div class="text-8xl md:text-9xl" id="projEmoji">📦</div>

        <!-- INFO -->
        <div class="flex-1">
          <h1 id="projTitulo" class="text-3xl md:text-4xl font-bold text-gray-900"></h1>

          <p id="projDescricao" class="text-gray-700 mt-4 leading-relaxed"></p>

          <div class="mt-6 flex flex-wrap gap-3">
            <button id="btnAbrir"
              class="bg-red-600 text-white px-6 py-3 rounded-2xl font-semibold hover:bg-red-500">
              Abrir no Editor
            </button>

            <button id="btnDuplicar"
              class="bg-gray-900 text-white px-6 py-3 rounded-2xl font-semibold hover:bg-black">
              Duplicar Projeto
            </button>
          </div>
        </div>
      </div>

      <!-- PREVIEW DO CÓDIGO (OPCIONAL) -->
      <div class="mt-10">
        <h2 class="text-xl font-semibold mb-3">Resumo do código</h2>
        <pre id="projPreview" class="bg-gray-900 text-green-300 text-sm p-4 rounded-2xl overflow-auto max-h-72"></pre>
      </div>

    </div>

    <!-- ERRO -->
    <div id="erro" class="hidden text-center text-red-600 text-lg font-semibold mt-10">
      Projeto não encontrado.
    </div>

  </main>
</body>
</html>
