  <div class="container">
    <h1>Avalie o AFFriend Code</h1>
    <p class="subtitle">A sua opinião ajuda-nos a melhorar</p>

    <!-- Média de Avaliações -->
    <div class="rating-summary">
      <div class="average" id="averageRating">0.0</div>
      <div class="stars-summary" id="averageStars">★★★★★</div>
      <small id="totalReviews">0 avaliações</small>
    </div>

    <!-- Estrelas para avaliar -->
    <div class="stars" id="stars">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>

    <textarea id="feedbackText" placeholder="Escreva as suas sugestões, críticas ou o que mais gostou..."></textarea>

    <button onclick="submitFeedback()">Enviar Feedback</button>

    <div id="successMessage" class="success">
      <i class="fas fa-check-circle"></i><br><br>
      Obrigado! O seu feedback foi recebido com sucesso.
    </div>
  </div>

  <!-- Firebase SDK completo -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
  <script>
   
  let selectedRating = 0;
  let currentUser = null;

  const stars = document.querySelectorAll('.star');

  stars.forEach(star => {
    star.addEventListener('click', () => {
      selectedRating = parseInt(star.dataset.value);
      stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= selectedRating));
    });
  });

  // ==================== VERIFICAÇÃO DE LOGIN ====================
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      currentUser = user;
      console.log("✅ Utilizador logado na página de feedback:", user.email);
      loadAverageRating();
    } else {
      console.log("❌ Nenhum utilizador logado");
      alert("Você precisa estar logado para enviar feedback.");
      window.location.href = "index.html";
    }
  });
  // Aplicar tema salvo
if (localStorage.getItem("darkMode") === "true") {
  document.documentElement.setAttribute("data-theme", "dark");
}

  // Carregar média de avaliações
  async function loadAverageRating() {
    try {
      const snapshot = await firebase.database().ref('feedbacks').once('value');
      const feedbacks = snapshot.val() || {};

      let total = 0;
      let count = 0;

      Object.values(feedbacks).forEach(fb => {
        if (fb.rating) {
          total += fb.rating;
          count++;
        }
      });

      const average = count > 0 ? (total / count).toFixed(1) : "0.0";

      document.getElementById("averageRating").textContent = average;
      document.getElementById("totalReviews").textContent = `${count} avaliações`;
    } catch (e) {
      console.error("Erro ao carregar média:", e);
    }
  }

  // Enviar feedback
  async function submitFeedback() {
    const text = document.getElementById("feedbackText").value.trim();
    const successMsg = document.getElementById("successMessage");

    if (selectedRating === 0) {
      alert("Por favor, selecione uma avaliação com estrelas.");
      return;
    }
    if (text.length < 10) {
      alert("Por favor, escreva pelo menos 10 caracteres.");
      return;
    }

    if (!currentUser) {
      alert("Você precisa estar logado para enviar feedback.");
      return;
    }

    try {
      await firebase.database().ref('feedbacks').push({
        rating: selectedRating,
        comment: text,
        timestamp: Date.now(),
        userEmail: currentUser.email || "Anônimo",
        userId: currentUser.uid
      });

      document.querySelector("button").style.display = "none";
      successMsg.style.display = "block";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 2000);

    } catch (error) {
      console.error("Erro ao enviar feedback:", error);
      alert("Erro ao enviar: " + error.message);
    }
  }

  // Inicialização
  window.onload = () => {
    // O onAuthStateChanged já vai tratar do resto
  };
</script>
 
  <script>
  // Aplicar tema salvo ao carregar qualquer página
  function applySavedTheme() {
    if (localStorage.getItem("darkMode") === "true") {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  }
  applySavedTheme();
</script>
