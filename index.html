    <h1>Redefinir Senha</h1>

      Crie uma nova senha segura para continuar a usar o AFFriend Code.

    <form id="resetForm">
      <div class="form-group">
        <label for="password">Nova Senha</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required/>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Senha</label>
        <input type="password" id="confirmPassword" placeholder="Repita a senha" required/>
      </div>

      <button type="submit" class="btn" id="btnReset">
        <i class="fas fa-key"></i> Alterar Senha
      </button>
    </form>

    <div class="social">

      <div class="social-links">

        <a href="https://www.facebook.com/share/18WgcHxAn9/" class="social-btn" target="_blank" title="Facebook">

        <a href="https://youtube.com/@afffriendcode" class="social-btn" target="_blank" title="YouTube">

        </a>

    </div>

    <div class="footer">

  <script>
    // Validação simples no frontend (podes integrar Firebase depois)

      e.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password.length < 6) {

<script>

  };

  firebase.initializeApp(firebaseConfig);

  document.getElementById("resetForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password.length < 6) {
      alert("A senha deve ter pelo menos 6 caracteres.");
      return;
    }

    if (password !== confirmPassword) {
      alert("As senhas não coincidem.");
      return;
    }

    // Pega o oobCode da URL do email
    const urlParams = new URLSearchParams(window.location.search);
    const oobCode = urlParams.get('oobCode');

    if (!oobCode) {
      alert("Link inválido ou expirado.");
      return;
    }

    firebase.auth().confirmPasswordReset(oobCode, password)
    .then(() => {
      alert("Senha alterada com sucesso! Pode fazer login agora.");
      // Opcional: redireciona para tela de login
      window.location.href = "https://teu-app.com/login";
    })
    .catch(err => {
      alert("Erro: " + err.message);
    });
  });
    });
