<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recibo de Compra — AFFriend Code</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <header class="fixed top-0 left-0 right-0 z-40 bg-black/80 backdrop-blur border-b border-red-900/40">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-bold text-lg">
          AF
        </div>
        <div class="leading-tight">
          <div class="text-white font-semibold text-sm md:text-base">Professor Abraão Figueira</div>
          <div class="text-xs text-gray-400">AFFriend Code Platform</div>
        </div>
      </div>
      <button onclick="window.print()"
        class="text-white bg-red-600 px-4 py-2 rounded-lg hover:bg-red-500">
        <i class="fa-solid fa-print"></i> Imprimir
      </button>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pt-28 pb-20 max-w-3xl mx-auto px-6">

    <!-- LOADING -->
    <div id="loading" class="text-center text-gray-600 text-lg">
      Carregando recibo...
    </div>

    <!-- RECIBO -->
    <div id="reciboBox" class="hidden bg-white shadow-xl rounded-3xl p-10">

      <h1 class="text-3xl font-bold text-gray-900 mb-6">Recibo de Compra</h1>

      <div class="border-b pb-6 mb-6">
        <p class="text-gray-700"><strong>Item:</strong> <span id="itemTitulo"></span></p>
        <p class="text-gray-700"><strong>Descrição:</strong> <span id="itemDescricao"></span></p>
        <p class="text-gray-700"><strong>Preço:</strong> <span id="itemPreco"></span> Kz</p>
        <p class="text-gray-700"><strong>Tipo:</strong> <span id="itemTipo"></span></p>
      </div>

      <div class="border-b pb-6 mb-6">
        <h2 class="text-xl font-semibold mb-2">Informações do Comprador</h2>
        <p class="text-gray-700"><strong>Email:</strong> <span id="buyerEmail"></span></p>
        <p class="text-gray-700"><strong>ID:</strong> <span id="buyerId"></span></p>
      </div>

      <div class="border-b pb-6 mb-6">
        <h2 class="text-xl font-semibold mb-2">Informações do Vendedor</h2>
        <p class="text-gray-700"><strong>ID:</strong> <span id="sellerId"></span></p>
      </div>

      <div class="pb-6 mb-6">
        <h2 class="text-xl font-semibold mb-2">Detalhes da Compra</h2>
        <p class="text-gray-700"><strong>ID da Compra:</strong> <span id="purchaseId"></span></p>
        <p class="text-gray-700"><strong>Data:</strong> <span id="purchaseDate"></span></p>
      </div>

      <button id="btnVoltar"
        class="w-full bg-red-600 text-white py-3 rounded-xl text-lg font-semibold hover:bg-red-500 transition">
        Voltar ao Item
      </button>

    </div>

    <!-- ERRO -->
    <div id="erro" class="hidden text-center text-red-600 text-lg font-semibold mt-10">
      Recibo não encontrado.
    </div>

  </main>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const db = firebase.database();
    const auth = firebase.auth();

    const params = new URLSearchParams(window.location.search);
    const purchaseId = params.get("id");

    let purchase = null;

    auth.onAuthStateChanged(user => {
      if (!user) {
        alert("Faça login para continuar.");
        location.href = "login.html";
        return;
      }

      carregarRecibo(user);
    });

    function carregarRecibo(user) {
      if (!purchaseId) {
        mostrarErro();
        return;
      }

      db.ref("purchases/" + purchaseId).once("value").then(snap => {
        document.getElementById("loading").classList.add("hidden");

        if (!snap.exists()) {
          mostrarErro();
          return;
        }

        purchase = snap.val();

        document.getElementById("reciboBox").classList.remove("hidden");

        document.getElementById("itemTitulo").textContent = purchase.title;
        document.getElementById("itemDescricao").textContent = purchase.description || "Sem descrição.";
        document.getElementById("itemPreco").textContent = purchase.price;
        document.getElementById("itemTipo").textContent = purchase.type;

        document.getElementById("buyerEmail").textContent = user.email;
        document.getElementById("buyerId").textContent = purchase.buyerId;
        document.getElementById("sellerId").textContent = purchase.sellerId;
        document.getElementById("purchaseId").textContent = purchaseId;
        document.getElementById("purchaseDate").textContent = new Date(purchase.createdAt).toLocaleString();

        document.getElementById("btnVoltar").onclick = () => {
          if (purchase.type === "curso") {
            location.href = "aulas.html?curso=" + purchase.id;
          } else {
            location.href = "projeto.html?id=" + purchase.id;
          }
        };
      });
    }

    function mostrarErro() {
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("erro").classList.remove("hidden");
    }
  </script>

</body>
</html>
