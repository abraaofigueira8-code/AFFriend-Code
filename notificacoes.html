      </div>
      <div class="text-gray-300 text-sm hidden md:block">
        <a href="notificacoes.html" class="hover:text-white">Notificações</a>
      </div>
      <div class="text-gray-300 text-sm hidden md:block">

      </div>
      <div class="text-gray-300 text-sm hidden md:block">

    </div>
      <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">

  <!-- LISTA -->
  <main class="pt-28 pb-20 max-w-4xl mx-auto px-6">

    <h1 class="text-3xl font-bold text-gray-900 mb-8">Notificações</h1>

    <div id="lista" class="space-y-4"></div>

    <p id="vazio" class="text-gray-500 mt-10 hidden">Nenhuma notificação.</p>

  </main>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const auth = firebase.auth();
    const db = firebase.database();

    let userId = null;

    auth.onAuthStateChanged(user => {
      if (!user) return location.href = "login.html";
      userId = user.uid;
      carregarNotificacoes();
    });

    function carregarNotificacoes() {
      db.ref("notifications/" + userId).on("value", snap => {
        const lista = document.getElementById("lista");
        const vazio = document.getElementById("vazio");

        lista.innerHTML = "";

        if (!snap.exists()) {
          vazio.classList.remove("hidden");
          return;
        }

        vazio.classList.add("hidden");

        snap.forEach(child => {
          const n = child.val();

          const card = `
            <div class="p-5 bg-white rounded-2xl shadow flex items-start gap-4 border-l-4 ${n.read ? 'border-gray-300' : 'border-red-600'}">
              <div class="text-2xl">${n.icon || "🔔"}</div>
              <div class="flex-1">
                <h3 class="font-semibold text-gray-900">${n.title}</h3>
                <p class="text-gray-600 text-sm mt-1">${n.message}</p>
                <p class="text-gray-400 text-xs mt-2">${new Date(n.time).toLocaleString()}</p>
              </div>
            </div>
          `;

          lista.insertAdjacentHTML("beforeend", card);

          if (!n.read) {
            db.ref("notifications/" + userId + "/" + child.key + "/read").set(true);
          }
        });
      });
    }
  </script>

</body>
</html>
