<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meus Projetos • AFFriend</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-gray-100">

<!-- SIDEBAR -->
<aside id="sidebar"
  class="fixed top-0 left-0 h-full w-64 bg-white shadow-xl border-r border-gray-200 flex flex-col
         transition-transform duration-300 -translate-x-full md:translate-x-0 z-50">

  <div class="px-6 py-6 border-b border-gray-200 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-red-600">AFFriend</h1>
      <p class="text-gray-500 text-sm">Painel do Criador</p>
    </div>

    <button onclick="toggleSidebar()" class="md:hidden text-gray-600 text-2xl">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-1">

    <button onclick="go('meus-projetos.html')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-red-600 text-white">
      <i class="fa-solid fa-lightbulb text-xl"></i>
      <span>Meus Projetos</span>
    </button>

    <button onclick="go('painel-vendedor.html')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100">
      <i class="fa-solid fa-money-bill-trend-up text-xl"></i>
      <span>Minhas Vendas</span>
    </button>

    <button onclick="go('perfil.html')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 hover:bg-gray-100">
      <i class="fa-solid fa-user text-xl"></i>
      <span>Perfil</span>
    </button>

  </nav>

  <div class="px-6 py-4 border-t border-gray-200">
    <button onclick="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg transition">
      Sair
    </button>
  </div>

</aside>

<!-- NAVBAR -->
<header class="fixed top-0 left-0 md:left-64 right-0 h-16 bg-white shadow flex items-center justify-between px-4 md:px-8 border-b z-40">

  <button onclick="toggleSidebar()" class="md:hidden text-2xl text-gray-700">
    <i class="fa-solid fa-bars"></i>
  </button>

  <h2 class="text-lg md:text-xl font-semibold text-gray-700">
    Meus Projetos
  </h2>

  <div class="flex items-center gap-3">
    <i class="fas fa-user-circle text-3xl text-gray-600"></i>
    <span id="userEmail" class="hidden sm:block text-gray-700 font-medium"></span>
  </div>

</header>

<!-- CONTEÚDO -->
<main class="md:ml-64 mt-20 px-4 md:px-8 pb-10">

  <!-- BOTÃO CRIAR PROJETO -->
  <div class="flex justify-end mb-6">
    <button onclick="go('dashboard.html')"
      class="bg-red-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-red-500 transition">
      <i class="fa-solid fa-plus mr-2"></i> Criar Novo Projeto
    </button>
  </div>

  <!-- LISTA DE PROJETOS -->
  <div id="listaProjetos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- SEM PROJETOS -->
  <p id="semProjetos" class="text-gray-500 text-center mt-10 hidden">
    Você ainda não criou nenhum projeto.
  </p>

</main>

<script src="meus-projectos.js"></script>

<script>
function go(p){ window.location.href = p }
function toggleSidebar(){ document.getElementById("sidebar").classList.toggle("-translate-x-full") }

firebase.auth().onAuthStateChanged(u=>{
  if(!u) return window.location.href="login.html"
  document.getElementById("userEmail").textContent = u.email
})
</script>

  <!-- Botão Flutuante AFFriend IA -->
<a href="affriendia.html" 
   class="fixed bottom-6 right-6 bg-red-600 text-white rounded-full shadow-lg px-5 py-3 flex items-center gap-3 hover:bg-red-700 transition transform hover:scale-110 z-50"
   title="Abrir AFFriend IA">
  <i class="fas fa-robot text-2xl"></i>
  <span class="font-semibold">Chat AFFriend IA</span>
</a>
</body>
</html>
