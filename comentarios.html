<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comentários - AFFriend Code</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body class="bg-gray-50">

  <!-- NAVBAR -->
  <header class="fixed top-0 left-0 right-0 z-40 bg-black/80 backdrop-blur border-b border-red-900/40">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-full bg-red-600 flex items-center justify-center text-white font-bold text-lg">AF</div>
        <div class="leading-tight">
          <div class="text-white font-semibold text-sm md:text-base">AFFriend Code</div>
          <div class="text-xs text-gray-400">Comentários</div>
        </div>
      </div>
      <a href="comunidade.html" class="text-gray-300 hover:text-white text-sm">Voltar</a>
    </div>
  </header>

  <!-- CONTEÚDO -->
  <main class="pt-28 pb-20 max-w-3xl mx-auto px-6">

    <h1 class="text-3xl font-bold text-gray-900 mb-8">Comentários</h1>

    <!-- LISTA DE COMENTÁRIOS -->
    <div id="listaComentarios" class="space-y-6"></div>

    <p id="semComentarios" class="text-gray-500 mt-10 hidden">Nenhum comentário ainda.</p>

    <!-- FORMULÁRIO -->
    <div class="mt-12 bg-white p-6 rounded-3xl shadow">
      <h2 class="text-xl font-semibold mb-4">Adicionar comentário</h2>

      <textarea id="comentarioInput" rows="3" placeholder="Escreva algo..."
        class="w-full p-4 border rounded-xl"></textarea>

      <button onclick="enviarComentario()"
        class="mt-4 bg-red-600 text-white px-6 py-3 rounded-xl font-semibold hover:bg-red-500">
        Publicar
      </button>
    </div>

  </main>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    const auth = firebase.auth();
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const projectId = params.get("id");

    let userId = null;
    let userData = null;

    auth.onAuthStateChanged(async user => {
      if (!user) return location.href = "login.html";

      userId = user.uid;

      // Buscar nome e avatar
      userData = {
        name: user.displayName || "Usuário",
        avatar: user.photoURL || ""
      };

      carregarComentarios();
    });

    function carregarComentarios() {
      db.ref("comments/" + projectId).on("value", snap => {
        const lista = document.getElementById("listaComentarios");
        const vazio = document.getElementById("semComentarios");

        lista.innerHTML = "";

        if (!snap.exists()) {
          vazio.classList.remove("hidden");
          return;
        }

        vazio.classList.add("hidden");

        snap.forEach(child => {
          const c = child.val();

          const card = `
            <div class="bg-white p-5 rounded-2xl shadow flex gap-4">
              <div class="w-12 h-12 rounded-full bg-gray-300 flex items-center justify-center text-xl">
                ${c.avatar ? `<img src="${c.avatar}" class="w-full h-full rounded-full object-cover">` : "👤"}
              </div>

              <div class="flex-1">
                <div class="flex justify-between">
                  <h3 class="font-semibold text-gray-900">${c.name}</h3>
                  <span class="text-gray-400 text-xs">${new Date(c.time).toLocaleString()}</span>
                </div>

                <p class="text-gray-700 mt-1">${c.text}</p>
              </div>
            </div>
          `;

          lista.insertAdjacentHTML("beforeend", card);
        });
      });
    }

    function enviarComentario() {
      const texto = document.getElementById("comentarioInput").value.trim();
      if (!texto) return alert("Escreva algo.");

      const ref = db.ref("comments/" + projectId).push();

      ref.set({
        userId,
        name: userData.name,
        avatar: userData.avatar,
        text: texto,
        time: Date.now()
      });

      document.getElementById("comentarioInput").value = "";
    }
  </script>

</body>
</html>
